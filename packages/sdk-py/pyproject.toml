[project]
name = "flychain-sdk"
version = "0.0.0"
description = "FlyChain Python SDK"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "httpx>=0.27.2",
    "pydantic>=2.9.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/flychain"]

[tool.hatch.metadata]
allow-direct-references = true
