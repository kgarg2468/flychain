id: sft-mlx-lora
description: |
  Default SFT LoRA recipe for Apple Silicon. Wraps `mlx_lm.lora` and produces a
  merged adapter plus GGUF artifacts suitable for serving via Ollama.
base_model: meta-llama/Llama-3.2-3B-Instruct
method: sft
backend: mlx-lm
hyperparams:
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  learning_rate: 2.0e-4
  epochs: 3
  batch_size: 2
  max_seq_len: 2048
  warmup_steps: 10
  seed: 42
promotion_threshold: 0.05
max_other_regression: 0.02
