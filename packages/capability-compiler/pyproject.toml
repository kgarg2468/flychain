[project]
name = "flychain-capability-compiler"
version = "0.0.0"
description = "Natural-language -> CapabilitySpec compiler for FlyChain"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "httpx>=0.27.2",
    "pydantic>=2.9.2",
    "pyyaml>=6.0.2",
    "numpy>=2.1.0",
    "scikit-learn>=1.5.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/flychain_capability_compiler"]

[tool.hatch.metadata]
allow-direct-references = true
