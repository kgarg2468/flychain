id: sft-mlx-lora-local-3b
description: |
  Local Apple Silicon SFT LoRA recipe for the public MLX community Llama 3.2 3B
  instruct model. Intended for end-to-end local adapter training and serving
  without requiring gated Hugging Face access.
base_model: mlx-community/Llama-3.2-3B-Instruct-4bit
method: sft
backend: mlx-lm
hyperparams:
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  learning_rate: 2.0e-5
  epochs: 3
  batch_size: 1
  max_seq_len: 2048
  warmup_steps: 0
  seed: 42
promotion_threshold: 0.05
max_other_regression: 0.02
